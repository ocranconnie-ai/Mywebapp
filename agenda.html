<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda</title>

<style>
:root{
  --primary:#2196f3;
  --primary-dark:#1976d2;
  --secondary:#64b5f6;
  --danger:#e53935;
  --bg:#f5f7fb;
}

body{
  font-family:Arial, sans-serif;
  background:var(--bg);
  margin:0;
}

/* ✅ HEADER */
.header{
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logout-btn{
  background:var(--danger);
  border:none;
  color:white;
  padding:6px 14px;
  border-radius:6px;
  cursor:pointer;
}
.logout-btn:hover{ background:#c62828; }

/* ✅ TAB NAV */
.tabs{
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}
.tab{
  flex:1;
  text-align:center;
  padding:14px;
  cursor:pointer;
  font-weight:bold;
  color:#555;
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}

/* ✅ CALENDAR */
.calendar{
  max-width:900px;
  margin:20px auto;
  background:white;
  border-radius:15px;
  padding:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

h2{
  text-align:center;
  margin-top:0;
}

.grid{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:6px;
}

.day-name{
  font-weight:bold;
  text-align:center;
  padding:6px 0;
}

.day{
  border:1px solid #ddd;
  border-radius:8px;
  padding:8px;
  font-size:13px;
  min-height:110px;
}

.day.today{
  border:2px solid var(--primary);
}

.day-number{
  font-weight:bold;
  margin-bottom:6px;
}

.event{
  background:var(--secondary);
  color:white;
  padding:5px;
  border-radius:6px;
  font-size:12px;
  margin-bottom:4px;
}

/* ✅ TABLET */
@media (max-width:1024px){
  .calendar{ max-width:95%; }
}

/* ✅ MOBILE */
@media (max-width:600px){
  .header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
  .logout-btn{
    align-self:flex-end;
  }

  .tabs{
    overflow-x:auto;
  }
  .tab{
    min-width:120px;
  }

  .grid{
    grid-template-columns:1fr;
  }
  .day-name{
    display:none;
  }
  .day{
    font-size:14px;
    min-height:auto;
  }
  .event{
    font-size:14px;
  }

  .calendar{
    margin:10px;
    padding:10px;
  }
}
</style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="header">
  <div class="header-left">
    <strong>GVP</strong>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>

<!-- ✅ TAB NAV -->
<div class="tabs">
  <div class="tab" onclick="location='prenotazione.html'">Prenotazioni</div>
  <div class="tab active">Agenda</div>
  <div class="tab" onclick="location='dashboard.html'">Dashboard</div>
</div>

<div class="calendar">
  <h2>Agenda</h2>
  <div class="grid" id="calendarGrid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ FIREBASE */
const app = initializeApp({
  apiKey:"__FIREBASE_API_KEY__",
  authDomain:"prenotazioni-cas.firebaseapp.com",
  projectId:"prenotazioni-cas"
});
const auth = getAuth(app);
const db = getFirestore(app);

/* ✅ LOGOUT */
logoutBtn.onclick = () =>
  auth.signOut().then(() => location="index.html");

const grid = document.getElementById("calendarGrid");

/* ✅ NOMI GIORNI */
["Lun","Mar","Mer","Gio","Ven","Sab","Dom"].forEach(d=>{
  const el=document.createElement("div");
  el.className="day-name";
  el.textContent=d;
  grid.appendChild(el);
});

/* ✅ CALCOLO 2 SETTIMANE */
const today = new Date();

/* Lunedì settimana corrente */
const dow = today.getDay() === 0 ? 7 : today.getDay();
const monday = new Date(today);
monday.setDate(today.getDate() - dow + 1);

/* 14 giorni */
const days = [];
for(let i=0;i<14;i++){
  const d = new Date(monday);
  d.setDate(monday.getDate() + i);
  days.push(d);
}

/* ✅ PRENOTAZIONI */
const snap = await getDocs(collection(db,"prenotazioni"));
const prenotazioni = {};

snap.forEach(doc=>{
  const p = doc.data();
  if(!prenotazioni[p.data]) prenotazioni[p.data]=[];
  prenotazioni[p.data].push(`${p.nome} (${p.fasciaOraria})`);
});

/* ✅ RENDER CALENDARIO */
days.forEach(date=>{
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  const dateStr = `${y}-${m}-${d}`;

  const cell = document.createElement("div");
  cell.className="day";

  if(date.toDateString() === today.toDateString()){
    cell.classList.add("today");
  }

  cell.innerHTML = `
    <div class="day-number">
      ${date.toLocaleDateString("it-IT",{ weekday:"short", day:"2-digit", month:"2-digit" })}
    </div>
  `;

  if(prenotazioni[dateStr]){
    prenotazioni[dateStr].forEach(ev=>{
      const e=document.createElement("div");
      e.className="event";
      e.textContent="• "+ev;
      cell.appendChild(e);
    });
  }

  grid.appendChild(cell);
});
</script>

</body>
</html>
