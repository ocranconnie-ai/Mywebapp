<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prenotazioni</title>

<!-- FLATPICKR CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
:root{
  --primary:#2196f3;
  --primary-dark:#1976d2;
  --danger:#e53935;
  --bg:#f5f7fb;
}

body{
  font-family:Arial;
  background:var(--bg);
  margin:0;
}

/* ================= HEADER ================= */
.header{
  background:var(--primary);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 16px;
}

.header-left{
  display:flex;
  align-items:center;
}

.header img{
  height:42px;
  margin-right:12px;
}

.header span{
  font-size:20px;
  font-weight:bold;
}

.logout-btn{
  background:var(--danger);
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  width:auto; /* ✅ importante */
}

/* ================= TAB BAR ================= */
.tabs{
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}

.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  color:#555;
}

.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}

.tab.admin{
  display:none;
}

/* ================= LAYOUT ================= */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* ✅ width:100% SOLO per elementi del form */
select,
input,
.card button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:15px;
  box-sizing:border-box;
}

.card button{
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
}

/* ================= ITEM LIST (COME DASHBOARD) ================= */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

/* ✅ cestino piccolo identico al dashboard */
.btn-delete{
  width:auto;
  height:auto;
  padding:5px 8px;
  margin:0;
  border:1px solid #f2caca;
  background:none;
  color:var(--danger);
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  line-height:1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
}


.btn-delete:hover{
  background:#fdeaea;
}
</style>
</head>

<body style="display:none">

<!-- ================= HEADER ================= -->
<div class="header">
  <div class="header-left">
    <img src="logo.png" alt="Logo">
    <span>GVP</span>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>

<!-- ================= TAB NAV ================= -->
<div class="tabs">
  <div class="tab active" id="tabPrenota">Prenotazioni</div>
  <div class="tab" id="tabAgenda">Agenda</div>
  <div class="tab admin" id="tabDashboard">Dashboard</div>
</div>

<div class="container">

  <!-- NUOVA PRENOTAZIONE -->
  <div class="card">
    <h3>Nuova prenotazione</h3>

    <select id="ospedale">
      <option value="">Seleziona ospedale</option>
    </select>

    <select id="fasciaOraria" disabled>
      <option value="">Fascia oraria</option>
      <option value="pomeridiana">Pomeridiana</option>
      <option value="serale">Serale</option>
    </select>

    <input type="text" id="data" placeholder="Seleziona data" disabled>
    <input type="text" id="nomeCompleto" placeholder="Nome e Cognome" disabled>

    <button id="prenotaBtn" onclick="prenota()" disabled>Prenota</button>
  </div>

  <!-- LE TUE PRENOTAZIONI -->
  <div class="card">
    <h3>Le tue prenotazioni</h3>
    <div id="listaPrenotazioni"></div>
  </div>

</div>

<!-- FLATPICKR -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, addDoc,
  deleteDoc, query, where, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"__FIREBASE_API_KEY__",
  authDomain:"prenotazioni-cas.firebaseapp.com",
  projectId:"prenotazioni-cas"
});

const auth = getAuth(app);
const db = getFirestore(app);

const adminEmail = "admin@admin.com";

const ospedale = document.getElementById("ospedale");
const fascia = document.getElementById("fasciaOraria");
const dataInput = document.getElementById("data");
const nomeCompletoInput = document.getElementById("nomeCompleto");
const prenotaBtn = document.getElementById("prenotaBtn");

const tabAgenda = document.getElementById("tabAgenda");
const tabDashboard = document.getElementById("tabDashboard");

onAuthStateChanged(auth, async user=>{
  if(!user){ location="index.html"; return; }
  document.body.style.display="block";
  if(user.email===adminEmail) tabDashboard.style.display="block";
  await caricaOspedali();
  await caricaPrenotazioni();
});

tabAgenda.onclick=()=>location="agenda.html";
tabDashboard.onclick=()=>location="dashboard.html";
logoutBtn.onclick=()=>auth.signOut().then(()=>location="index.html");

/* OSPEDALI */
async function caricaOspedali(){
  ospedale.innerHTML="<option value=''>Seleziona ospedale</option>";
  const snap = await getDocs(collection(db,"ospedali"));
  snap.forEach(d=>{
    ospedale.innerHTML+=`<option>${d.data().nome}</option>`;
  });
  ospedale.onchange=()=>{
    fascia.disabled=false;
    dataInput.disabled=false;
  };
}

/* CALENDARIO */
fascia.onchange=()=>{
  flatpickr("#data",{ dateFormat:"Y-m-d", minDate:"today" });
  nomeCompletoInput.disabled=false;
};

/* PRENOTA */
window.prenota = async ()=>{
  await addDoc(collection(db,"prenotazioni"),{
    ospedale:ospedale.value,
    fasciaOraria:fascia.value,
    data:dataInput.value,
    nomeCompleto:nomeCompletoInput.value,
    email:auth.currentUser.email
  });
  caricaPrenotazioni();
};

/* ✅ FORMAT IDENTICO AL DASHBOARD */
async function caricaPrenotazioni(){
  const q = query(
    collection(db,"prenotazioni"),
    where("email","==",auth.currentUser.email)
  );
  const snap = await getDocs(q);
  listaPrenotazioni.innerHTML="";

  snap.forEach(d=>{
    const p = d.data();
    const div = document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <span>
        <strong>${p.nomeCompleto}</strong> – ${p.ospedale} – ${p.data}
        <br>
        <small style="color:#666">${p.fasciaOraria}</small>
      </span>
      <button class="btn-delete">🗑</button>
    `;
    div.querySelector("button").onclick=async()=>{
      if(confirm("Confermi cancellazione?")){
        await deleteDoc(doc(db,"prenotazioni",d.id));
        caricaPrenotazioni();
      }
    };
    listaPrenotazioni.appendChild(div);
  });
}
</script>
</body>
</html>
