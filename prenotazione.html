<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prenotazioni</title>

<!-- FLATPICKR CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">

<style>
:root{
  --primary:#2196f3;
  --primary-dark:#1976d2;
  --secondary:#64b5f6;
  --danger:#e53935;
  --bg:#f5f7fb;
  --warning:#ff9800;
}

body{
  font-family:Arial;
  background:var(--bg);
  margin:0;
}

/* ✅ HEADER */
.header{
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 16px;
}

.header-left{
  display:flex;
  align-items:center;
}

.header img{
  height:42px;
  margin-right:12px;
}

.header span{
  font-size:20px;
  font-weight:bold;
}

/* ✅ LOGOUT ROSSO */
.logout-btn{
  background:var(--danger);
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  width:auto;
  margin:0;
}
.logout-btn:hover{
  background:#c62828;
}

/* ✅ TAB BAR */
.tabs{
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}
.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  color:#555;
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}
.tab.admin{ display:none; }

/* LAYOUT */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}

select,input,button{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:15px;
  box-sizing:border-box;
}

/* BOTTONI */
button{
  cursor:pointer;
  background:var(--primary);
  color:white;
  border:none;
}
button:hover{ background:var(--primary-dark); }

.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.item-info{
  flex:1;
}

/* ✅ DELETE BUTTON - PROFESSIONAL */
.delete-btn{
  background:transparent;
  border:none;
  color:var(--danger);
  font-size:20px;
  cursor:pointer;
  padding:0;
  margin-left:10px;
  transition:all 0.2s ease;
  font-weight:bold;
}
.delete-btn:hover{
  color:#c62828;
  transform:scale(1.2);
}

/* ✅ CALENDAR - FULL DATE */
.flatpickr-day.full{
  background:#ffcdd2 !important;
  color:#c62828 !important;
  font-weight:bold;
  cursor:not-allowed !important;
  pointer-events:none;
}

/* ✅ CALENDAR - PARTIALLY FULL (ONE FASCIA FULL) */
.flatpickr-day.partial{
  background:#fff3cd !important;
  color:#ff6f00 !important;
  font-weight:bold;
  border:2px solid var(--warning) !important;
}
  
  /* ✅ ITEM LIST STYLE ALLINEATO AL DASHBOARD */
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.item strong{
  font-weight:bold;
}

.btn-delete{
  border:1px solid #f2caca;
  background:none;
  color:var(--danger);
  border-radius:6px;
  padding:5px 8px;
  cursor:pointer;
  transition:.15s;
}

.btn-delete:hover{
  background:#fdeaea;
}
</style>
</head>

<body style="display:none">

<!-- ✅ HEADER -->
<div class="header">
  <div class="header-left">
    <img src="logo.png" alt="Logo">
    <span>GVP</span>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>

<!-- ✅ TAB NAV -->
<div class="tabs">
  <div class="tab active" id="tabPrenota">Prenotazioni</div>
  <div class="tab" id="tabAgenda">Agenda</div>
  <div class="tab admin" id="tabDashboard">Dashboard</div>
</div>

<div class="container">

  <div class="card">
    <h3>Nuova prenotazione</h3>

    <select id="ospedale">
      <option value="">Seleziona ospedale</option>
    </select>

    <select id="fasciaOraria" disabled>
      <option value="">Fascia oraria</option>
      <option value="pomeridiana">Pomeridiana</option>
      <option value="serale">Serale</option>
    </select>

    <input type="text" id="data" placeholder="Seleziona data" disabled>

    <input type="text" id="nomeCompleto" placeholder="Nome e Cognome" disabled>

    <button id="prenotaBtn" onclick="prenota()" disabled>Prenota</button>
  </div>

  <div class="card">
    <h3>Le tue prenotazioni</h3>
    <div id="listaPrenotazioni"></div>
  </div>

</div>

<!-- FLATPICKR -->
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, getDocs, addDoc,
  deleteDoc, query, where, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey: "__FIREBASE_API_KEY__",
  authDomain:"prenotazioni-cas.firebaseapp.com",
  projectId:"prenotazioni-cas"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const adminEmail="admin@admin.com";

const ospedale=document.getElementById("ospedale");
const fascia=document.getElementById("fasciaOraria");
const dataInput=document.getElementById("data");
const nomeCompletoInput=document.getElementById("nomeCompleto");
const prenotaBtn=document.getElementById("prenotaBtn");

const tabAgenda=document.getElementById("tabAgenda");
const tabDashboard=document.getElementById("tabDashboard");
const tabPrenota=document.getElementById("tabPrenota");

let flatpickrInstance=null;

/* AUTH */
onAuthStateChanged(auth, async user=>{
  if(!user){ location="index.html"; return; }
  document.body.style.display="block";

  if(user.email.toLowerCase()===adminEmail){
    tabDashboard.style.display="block";
  }

  await caricaOspedali();
  await caricaPrenotazioni();
});

/* TAB NAV */
tabAgenda.onclick=()=>location="agenda.html";
tabDashboard.onclick=()=>location="dashboard.html";
tabPrenota.onclick=()=>location="prenotazione.html";

/* LOGOUT */
logoutBtn.onclick=()=>auth.signOut().then(()=>location="index.html");

/* OSPEDALI */
async function caricaOspedali(){
  ospedale.innerHTML="<option value=''>Seleziona ospedale</option>";
  const snap=await getDocs(collection(db,"ospedali"));
  snap.forEach(d=>{
    ospedale.innerHTML+=`<option value="${d.data().nome}">${d.data().nome}</option>`;
  });

  ospedale.onchange=()=>{
    fascia.disabled=false;
    dataInput.disabled=false;
    prenotaBtn.disabled=true;
  };
}

/* COUNT BOOKINGS FOR DATE/FASCIA/OSPEDALE */
async function contaPrenotazioni(data, fasciaOraria, ospedaleNome){
  const q=query(
    collection(db,"prenotazioni"),
    where("data","==",data),
    where("fasciaOraria","==",fasciaOraria),
    where("ospedale","==",ospedaleNome)
  );
  const snap=await getDocs(q);
  return snap.size;
}

/* CALENDARIO */
fascia.onchange=()=>{
  if(flatpickrInstance) flatpickrInstance.destroy();
  
  const today=new Date();
  const maxDate=new Date();
  maxDate.setDate(maxDate.getDate()+7);
  
  flatpickrInstance=flatpickr("#data",{
    dateFormat:"Y-m-d",
    minDate:"today",
    maxDate:maxDate,
    onChange:()=>{
      nomeCompletoInput.disabled=false;
      checkFormComplete();
    },
    onReady:()=>{
      highlightFullDates();
    }
  });
};

/* HIGHLIGHT FULL AND PARTIAL DATES IN CALENDAR */
async function highlightFullDates(){
  if(!ospedale.value || !fascia.value) return;
  
  const days=document.querySelectorAll(".flatpickr-day");
  for(let day of days){
    if(day.classList.contains("prevMonthDay") || day.classList.contains("nextMonthDay")) continue;
    
    const dateNum=day.textContent.trim();
    if(!dateNum || dateNum==="") continue;
    
    const currentMonth=flatpickrInstance.currentMonth;
    const currentYear=flatpickrInstance.currentYear;
    const dateStr=`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(dateNum).padStart(2,"0")}`;
    
    const countPomeridiana=await contaPrenotazioni(dateStr, "pomeridiana", ospedale.value);
    const countSerale=await contaPrenotazioni(dateStr, "serale", ospedale.value);
    
    // Remove previous classes
    day.classList.remove("full", "partial");
    
    // Check current selected fascia oraria
    if(fascia.value==="pomeridiana"){
      // User selecting pomeridiana - highlight if pomeridiana is full
      if(countPomeridiana>=2){
        day.classList.add("partial");
      }
    } else if(fascia.value==="serale"){
      // User selecting serale - highlight if serale is full
      if(countSerale>=2){
        day.classList.add("partial");
      }
    }
    
    // If both are full, show red
    if(countPomeridiana>=2 && countSerale>=2){
      day.classList.remove("partial");
      day.classList.add("full");
    }
  }
}

/* CHECK FORM COMPLETENESS */
function checkFormComplete(){
  const allFilled=ospedale.value && fascia.value && dataInput.value && nomeCompletoInput.value.trim();
  prenotaBtn.disabled=!allFilled;
}

/* INPUT LISTENERS */
nomeCompletoInput.addEventListener("input", checkFormComplete);

/* PRENOTA */
window.prenota=async()=>{
  const user=auth.currentUser;
  const count=await contaPrenotazioni(dataInput.value, fascia.value, ospedale.value);
  
  if(count>=2){
    alert("Questa fascia oraria è piena!");
    return;
  }
  
  await addDoc(collection(db,"prenotazioni"),{
    ospedale:ospedale.value,
    fasciaOraria:fascia.value,
    data:dataInput.value,
    nomeCompleto:nomeCompletoInput.value.trim(),
    email:user.email
  });
  caricaPrenotazioni();
  highlightFullDates();
  ospedale.value="";
  fascia.value="";
  dataInput.value="";
  nomeCompletoInput.value="";
  prenotaBtn.disabled=true;
  fascia.disabled=true;
  dataInput.disabled=true;
  nomeCompletoInput.disabled=true;
};

/* PRENOTAZIONI */
async function caricaPrenotazioni(){
  const q=query(
    collection(db,"prenotazioni"),
    where("email","==",auth.currentUser.email)
  );
  const snap=await getDocs(q);
  listaPrenotazioni.innerHTML="";
  snap.forEach(d=>{
    const p=d.data();
    listaPrenotazioni.innerHTML+=`
      <div class="item">
        <div class="item-info">
          ${p.ospedale} – ${p.data} – ${p.fasciaOraria} – ${p.nomeCompleto}
        </div>
        <button class="delete-btn" onclick="elimina('${d.id}')" title="Elimina prenotazione">×</button>
      </div>`;
  });
}

window.elimina=async id=>{
  if(!confirm("Confermi cancellazione?")) return;
  await deleteDoc(doc(db,"prenotazioni",id));
  caricaPrenotazioni();
  highlightFullDates();
};
</script>

</body>
</html>
