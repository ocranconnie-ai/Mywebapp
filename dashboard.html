<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>
:root{
  --primary:#2196f3;
  --primary-dark:#1976d2;
  --danger:#e53935;
  --bg:#f5f7fb;
}
body{
  font-family:Arial, sans-serif;
  background:var(--bg);
  margin:0;
}
.header{
  background:var(--primary);
  color:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 16px;
}
.tabs{
  display:flex;
  background:white;
  border-bottom:1px solid #ddd;
}
.tab{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  color:#555;
}
.tab.active{
  color:var(--primary);
  border-bottom:3px solid var(--primary);
}
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
}
.card{
  background:white;
  border-radius:12px;
  padding:16px;
  box-shadow:0 4px 10px rgba(0,0,0,.08);
}
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

/* ✅ BOTTONI PULITI */
.btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  border-radius:6px;
  font-size:13px;
  font-weight:600;
  border:1px solid transparent;
  cursor:pointer;
  transition:.15s;
  background:none;
}
.btn-primary{
  background:var(--primary);
  color:white;
}
.btn-primary:hover{ background:var(--primary-dark); }

.btn-edit{
  border:1px solid #ddd;
  color:#444;
}
.btn-edit:hover{ background:#f5f5f5; }

.btn-delete{
  border:1px solid #f2caca;
  color:var(--danger);
}
.btn-delete:hover{ background:#fdeaea; }

.btn-icon{
  padding:5px 8px;
}

.logout-btn{
  background:var(--danger);
  color:white;
  border:none;
  border-radius:6px;
  padding:6px 12px;
  cursor:pointer;
}
</style>
</head>

<body style="display:none">

<div class="header">
  <strong>GVP</strong>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>

<div class="tabs">
  <div class="tab" onclick="location='prenotazione.html'">Prenotazioni</div>
  <div class="tab" onclick="location='agenda.html'">Agenda</div>
  <div class="tab active">Dashboard</div>
</div>

<div class="container">
  <div class="grid">

    <!-- PRENOTAZIONI -->
    <div class="card">
      <div class="card-header">
        <h3>Prenotazioni</h3>
      </div>
      <div id="listaPrenotazioni"></div>
    </div>

    <!-- PAZIENTI -->
    <div class="card">
      <div class="card-header">
        <h3>Pazienti</h3>
        <button id="btnNuovoPaz" class="btn btn-primary">＋ Nuovo</button>
      </div>
      <div id="listaPazienti"></div>
    </div>

    <!-- OSPEDALI -->
    <div class="card">
      <div class="card-header">
        <h3>Ospedali</h3>
        <button id="btnNuovoOsp" class="btn btn-primary">＋ Nuovo</button>
      </div>
      <div id="listaOspedali"></div>
    </div>

  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, deleteDoc, updateDoc, doc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({
  apiKey:"__FIREBASE_API_KEY__",
  authDomain:"prenotazioni-cas.firebaseapp.com",
  projectId:"prenotazioni-cas"
});
const auth=getAuth(app);
const db=getFirestore(app);
const adminEmail="admin@admin.com";

onAuthStateChanged(auth,user=>{
  if(!user || user.email!==adminEmail){
    location="index.html"; return;
  }
  document.body.style.display="block";
  caricaPrenotazioni();
  caricaPazienti();
  caricaOspedali();
});

logoutBtn.onclick=()=>auth.signOut().then(()=>location="index.html");
btnNuovoPaz.onclick=()=>location="aggiungiPaziente.html";
btnNuovoOsp.onclick=()=>location="aggiungiOspedale.html";

async function caricaPrenotazioni(){
  listaPrenotazioni.innerHTML="";
  const snap=await getDocs(collection(db,"prenotazioni"));
  snap.forEach(d=>{
    const p=d.data();
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <span><strong>${p.nomeCompleto}</strong> – ${p.ospedale} – ${p.data}</span>
      <button class="btn btn-delete btn-icon">🗑</button>
    `;
    div.querySelector("button").onclick=async()=>{
      if(confirm("Eliminare prenotazione?")){
        await deleteDoc(doc(db,"prenotazioni",d.id));
        caricaPrenotazioni();
      }
    };
    listaPrenotazioni.appendChild(div);
  });
}

async function caricaPazienti(){
  listaPazienti.innerHTML="";
  const snap=await getDocs(collection(db,"pazienti"));
  snap.forEach(d=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <span>${d.data().nome}</span>
      <div>
        <button class="btn btn-edit btn-icon">✏</button>
        <button class="btn btn-delete btn-icon">🗑</button>
      </div>
    `;
    div.querySelector(".btn-edit").onclick=async()=>{
      const n=prompt("Nuovo nome",d.data().nome);
      if(n){ await updateDoc(doc(db,"pazienti",d.id),{nome:n}); caricaPazienti(); }
    };
    div.querySelector(".btn-delete").onclick=async()=>{
      if(confirm("Eliminare paziente?")){
        await deleteDoc(doc(db,"pazienti",d.id));
        caricaPazienti();
      }
    };
    listaPazienti.appendChild(div);
  });
}

async function caricaOspedali(){
  listaOspedali.innerHTML="";
  const snap=await getDocs(collection(db,"ospedali"));
  snap.forEach(d=>{
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <span>${d.data().nome}</span>
      <div>
        <button class="btn btn-edit btn-icon">✏</button>
        <button class="btn btn-delete btn-icon">🗑</button>
      </div>
    `;
    div.querySelector(".btn-edit").onclick=async()=>{
      const n=prompt("Nuovo nome",d.data().nome);
      if(n){ await updateDoc(doc(db,"ospedali",d.id),{nome:n}); caricaOspedali(); }
    };
    div.querySelector(".btn-delete").onclick=async()=>{
      if(confirm("Eliminare ospedale?")){
        await deleteDoc(doc(db,"ospedali",d.id));
        caricaOspedali();
      }
    };
    listaOspedali.appendChild(div);
  });
}
</script>
</body>
</html>
