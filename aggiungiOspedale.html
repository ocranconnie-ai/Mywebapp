<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Ospedali</title>

<style>
:root{
  --primary:#2196f3;
  --secondary:#64b5f6;
  --danger:#e53935;
  --bg:#f5f7fb;
}

body{
  font-family: Arial, sans-serif;
  background:var(--bg);
  margin:0;
  display:none;
}

/* ✅ HEADER (UGUALE AD AGENDA) */
.header{
  background:var(--primary);
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
}

.header-left{
  display:flex;
  align-items:center;
}

.header img{
  height:40px;
  margin-right:12px;
}

.header span{
  font-size:20px;
  font-weight:bold;
}

.logout-btn{
  background:var(--danger);
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
}

.logout-btn:hover{
  background:#c62828;
}

/* ✅ CONTENUTO */
.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:15px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

#salvaBtn{
  background:#4CAF50;
  color:white;
}

#indietroBtn{
  background:var(--danger);
  color:white;
}

.edit-btn{
  background:#f39c12;
  color:white;
  margin-top:5px;
}

.delete-btn{
  background:var(--danger);
  color:white;
  margin-top:5px;
}

.item{
  border-bottom:1px solid #eee;
  padding:10px 0;
}
</style>
</head>

<body>

<!-- ✅ HEADER -->
<div class="header">
  <div class="header-left">
    <img src="logo.png" alt="Logo">
    <span>Gestione Ospedali</span>
  </div>
  <button id="logoutBtn" class="logout-btn">Logout</button>
</div>

<div class="container">

  <!-- ➕ AGGIUNGI -->
  <div class="card">
    <h3>Aggiungi ospedale</h3>
    <input type="text" id="nome" placeholder="Nome ospedale">
    <input type="text" id="indirizzo" placeholder="Indirizzo">
    <button id="salvaBtn">Salva</button>
  </div>

  <!-- 📋 LISTA -->
  <div class="card">
    <h3>Ospedali esistenti</h3>
    <div id="listaOspedali"></div>
  </div>

  <!-- 🔙 -->
  <button id="indietroBtn">Torna indietro</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDZUTVFhbATsDmBP0VOr7fmfPByQGqwSIE",
  authDomain: "prenotazioni-cas.firebaseapp.com",
  projectId: "prenotazioni-cas",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const adminEmail = "admin@admin.com";

/* 🔐 CONTROLLO ACCESSO */
onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location = "index.html";
    return;
  }
  if(user.email !== adminEmail){
    alert("Non autorizzato");
    window.location = "prenotazione.html";
    return;
  }
  document.body.style.display = "block";
  caricaOspedali();
});

/* ➕ AGGIUNGI OSPEDALE */
salvaBtn.onclick = async () => {
  const nome = nome.value.trim();
  const indirizzo = indirizzo.value.trim();

  if(!nome || !indirizzo){
    alert("Compila tutti i campi");
    return;
  }

  await addDoc(collection(db,"ospedali"), { nome, indirizzo });
  nome.value = "";
  indirizzo.value = "";
  caricaOspedali();
};

/* 📋 CARICA LISTA */
async function caricaOspedali(){
  const snapshot = await getDocs(collection(db,"ospedali"));
  listaOspedali.innerHTML = "";

  snapshot.forEach(docSnap => {
    const d = docSnap.data();
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
      <strong>${d.nome}</strong><br>
      ${d.indirizzo}<br>
      <button class="edit-btn" onclick="modifica('${docSnap.id}','${d.nome}','${d.indirizzo}')">Modifica</button>
      <button class="delete-btn" onclick="elimina('${docSnap.id}')">Elimina</button>
    `;
    listaOspedali.appendChild(div);
  });
}

/* ✏️ MODIFICA */
window.modifica = async (id,nome,indirizzo) => {
  const nuovoNome = prompt("Nuovo nome", nome);
  const nuovoIndirizzo = prompt("Nuovo indirizzo", indirizzo);
  if(!nuovoNome || !nuovoIndirizzo) return;

  await updateDoc(doc(db,"ospedali",id), {
    nome: nuovoNome,
    indirizzo: nuovoIndirizzo
  });
  caricaOspedali();
};

/* ❌ ELIMINA */
window.elimina = async (id) => {
  if(!confirm("Eliminare ospedale?")) return;
  await deleteDoc(doc(db,"ospedali",id));
  caricaOspedali();
};

/* 🔙 TORNA */
indietroBtn.onclick = () => {
  window.location = "prenotazione.html";
};

/* 🚪 LOGOUT */
logoutBtn.onclick = () => {
  auth.signOut().then(() => window.location = "index.html");
};
</script>

</body>
</html>
