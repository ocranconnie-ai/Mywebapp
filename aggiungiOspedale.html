<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aggiungi Ospedale</title>

<style>
body{
  font-family: Arial;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:30px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  width:350px;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3498db;
  color:white;
  font-size:15px;
}

button:hover{
  background:#2980b9;
}

#indietroBtn{
  background:#e74c3c;
  margin-top:10px;
}
</style>
</head>

<body style="display:none">

<div class="card">
  <h2>Aggiungi Ospedale</h2>

  <input type="text" id="nome" placeholder="Nome ospedale">
  <input type="text" id="indirizzo" placeholder="Indirizzo">

  <button id="salvaBtn">Salva</button>
  <button id="indietroBtn">Indietro</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔐 Firebase */
const firebaseConfig = {
  apiKey: "__FIREBASE_API_KEY__",
  authDomain: "prenotazioni-cas.firebaseapp.com",
  projectId: "prenotazioni-cas",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* 🔐 Solo admin */
const adminEmail = "admin@admin.com";

onAuthStateChanged(auth, user=>{
  if(!user){
    window.location = "index.html";
    return;
  }
  if(user.email !== adminEmail){
    alert("Non autorizzato");
    window.location = "prenotazione.html";
    return;
  }
  document.body.style.display = "flex";
});

/* ✅ Salva ospedale */
document.getElementById("salvaBtn").onclick = async ()=>{
  const nome = document.getElementById("nome").value.trim();
  const indirizzo = document.getElementById("indirizzo").value.trim();

  if(!nome || !indirizzo){
    alert("Compila tutti i campi");
    return;
  }

  await addDoc(collection(db,"ospedali"),{
    nome,
    indirizzo
  });

  alert("✅ Ospedale aggiunto correttamente");
  window.location = "dashboard.html";
};

/* 🔙 Indietro */
document.getElementById("indietroBtn").onclick = ()=>{
  window.location = "dashboard.html";
};
</script>

</body>
</html>
